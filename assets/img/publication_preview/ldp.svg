<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07101f"/>
      <stop offset="1" stop-color="#1b2b55"/>
    </linearGradient>

    <linearGradient id="reg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#60a5fa" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#f59e0b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title { font: 700 46px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .subtitle { font: 600 26px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.86); }
      .meta { font: 500 22px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.74); }
      .small { font: 500 18px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.70); }
      .panel { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.12); stroke-width: 2; }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 2; }
      .curve { fill: none; stroke: rgba(255,255,255,0.75); stroke-width: 4.5; }
      .curve2 { fill: none; stroke: rgba(255,255,255,0.40); stroke-width: 3; stroke-dasharray: 6 8; }
      .dot { fill: rgba(255,255,255,0.92); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Header card -->
  <g filter="url(#shadow)">
    <rect x="60" y="55" width="1080" height="210" rx="28" class="panel"/>
  </g>

  <text x="100" y="125" class="title">Large deviation principles &amp; functional limit theorems</text>
  <text x="100" y="168" class="subtitle">Deep limit of wide random neural networks on the sphere</text>
  <text x="100" y="210" class="meta">arXiv:2601.04677 · math.PR · 2026</text>

  <!-- Bottom card -->
  <g filter="url(#shadow)">
    <rect x="60" y="295" width="1080" height="280" rx="28" class="panel"/>
  </g>

  <!-- Regimes bar -->
  <text x="100" y="330" class="meta">Regimes (behavior at t = 1)</text>
  <rect x="100" y="345" width="1000" height="14" rx="7" fill="url(#reg)"/>
  <text x="100" y="392" class="small">low-disorder</text>
  <text x="520" y="392" class="small">sparse</text>
  <text x="930" y="392" class="small">high-disorder</text>

  <!-- Left mini-plot: rate function sketch -->
  <text x="110" y="435" class="small">Rate function I(·)</text>
  <line x1="110" y1="545" x2="520" y2="545" class="axis"/>
  <line x1="110" y1="455" x2="110" y2="545" class="axis"/>
  <path d="M130 545 C 190 540, 235 520, 270 495
           C 305 470, 360 455, 500 455" class="curve"/>
  <path d="M130 545 C 210 535, 260 505, 305 485
           C 350 465, 410 458, 500 458" class="curve2"/>
  <circle cx="270" cy="495" r="6" class="dot"/>
  <text x="135" y="570" class="small">x</text>

  <!-- Right mini-plot: functional vs finite-dim -->
  <text x="640" y="435" class="small">Functional vs finite-dimensional</text>
  <line x1="640" y1="545" x2="1090" y2="545" class="axis"/>
  <line x1="640" y1="455" x2="640" y2="545" class="axis"/>

  <!-- “paths” on [0,1] -->
  <path d="M660 520 C 720 490, 780 560, 840 520 S 960 490, 1070 520" class="curve"/>
  <path d="M660 505 C 740 470, 805 585, 880 505 S 980 470, 1070 505" class="curve2"/>

  <!-- “discontinuity” cue -->
  <line x1="870" y1="470" x2="870" y2="545" stroke="rgba(255,255,255,0.35)" stroke-width="3" stroke-dasharray="6 8"/>
  <text x="885" y="480" class="small">jump</text>

  <text x="100" y="608" class="small">Isotropic Gaussian fields on S² · recursion via activation-induced covariance map</text>

  <!-- Sphere icon (top-right) -->
  <g transform="translate(1030 88)">
    <circle cx="60" cy="60" r="54" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <ellipse cx="60" cy="60" rx="48" ry="18" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="2"/>
    <ellipse cx="60" cy="60" rx="22" ry="48" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
    <circle cx="60" cy="28" r="4" class="dot"/>
    <text x="16" y="118" class="small">S²</text>
  </g>
</svg>
