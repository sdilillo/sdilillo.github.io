<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1f2a44"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#f59e0b" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ef4444" stop-opacity="0.95"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>

    <style>
      .title { font: 700 52px Arial, Helvetica, sans-serif; fill: #ffffff; }
      .subtitle { font: 600 28px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.86); }
      .meta { font: 500 22px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.75); }
      .chip { font: 700 18px Arial, Helvetica, sans-serif; fill: rgba(15,23,42,0.95); }
      .chip2 { font: 700 18px Arial, Helvetica, sans-serif; fill: rgba(255,255,255,0.92); }
      .axis { stroke: rgba(255,255,255,0.22); stroke-width: 2; }
      .curve { fill: none; stroke: rgba(255,255,255,0.72); stroke-width: 5; }
      .dot { fill: rgba(255,255,255,0.95); }
      .dot2 { fill: rgba(255,255,255,0.55); }
      .panel { fill: rgba(255,255,255,0.06); stroke: rgba(255,255,255,0.12); stroke-width: 2; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top card -->
  <g filter="url(#softShadow)">
    <rect x="60" y="55" width="1080" height="220" rx="28" class="panel"/>
  </g>

  <!-- Title -->
  <text x="100" y="140" class="title">Critical Points of Random Neural Networks</text>
  <text x="100" y="190" class="subtitle">Asymptotics across depth: convergent · polynomial · exponential</text>
  <text x="100" y="232" class="meta">arXiv:2505.17000 · stat.ML · 2025</text>

  <!-- Chips -->
  <g transform="translate(835 95)">
    <rect x="0" y="0" width="280" height="44" rx="22" fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.18)"/>
    <text x="20" y="29" class="chip2">Expected # critical points</text>
  </g>

  <!-- Bottom plot card -->
  <g filter="url(#softShadow)">
    <rect x="60" y="305" width="1080" height="270" rx="28" class="panel"/>
  </g>

  <!-- Regime bar -->
  <rect x="110" y="335" width="980" height="14" rx="7" fill="url(#accent)" opacity="0.95"/>
  <text x="110" y="325" class="meta">Regimes (κ′(1))</text>
  <text x="110" y="385" class="chip2">convergent</text>
  <text x="530" y="385" class="chip2">polynomial</text>
  <text x="910" y="385" class="chip2">exponential</text>

  <!-- Axes -->
  <line x1="110" y1="535" x2="1090" y2="535" class="axis"/>
  <line x1="110" y1="420" x2="110" y2="535" class="axis"/>
  <text x="1020" y="565" class="meta">depth</text>
  <text x="110" y="410" class="meta">E[#crit]</text>

  <!-- Landscape-like curve with critical points -->
  <path d="M130 505
           C 210 430, 290 560, 370 470
           S 520 440, 600 500
           S 720 560, 820 455
           S 950 410, 1070 470" class="curve"/>

  <!-- Critical points markers -->
  <circle cx="235" cy="452" r="8" class="dot"/>
  <circle cx="310" cy="540" r="7" class="dot2"/>
  <circle cx="415" cy="470" r="8" class="dot"/>
  <circle cx="575" cy="495" r="7" class="dot2"/>
  <circle cx="685" cy="535" r="7" class="dot2"/>
  <circle cx="835" cy="458" r="8" class="dot"/>
  <circle cx="980" cy="425" r="8" class="dot"/>

  <!-- Small legend -->
  <g transform="translate(760 515)">
    <rect x="0" y="0" width="330" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.14)"/>
    <circle cx="24" cy="22" r="6" class="dot"/>
    <text x="40" y="28" class="meta">local extrema / saddles (schematic)</text>
  </g>
</svg>
