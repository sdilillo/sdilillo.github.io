title: "Simmaco Di Lillo"
description: "Mathematics — Random Fields, Spectral Geometry, Neural Networks"
url: "https://sdilillo.github.io"
baseurl: ""

remote_theme: "mmistakes/minimal-mistakes"
plugins:
  - jekyll-include-cache

minimal_mistakes_skin: "air"   # prova anche: "contrast", "dark", "mint", "plum"

author:
  name: "Simmaco Di Lillo"
  avatar: "/assets/images/avatar.jpg"   # opzionale: metti un file qui
  bio: "PhD student in Mathematics. Random fields, geometry & deep networks."
  location: "Rome, Italy"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/sdilillo"
    - label: "arXiv"
      icon: "ai ai-arxiv"
      url: "https://arxiv.org/search/?searchtype=author&query=Di+Lillo%2C+S"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:YOUR@EMAIL"

collections:
  publications:
    output: true
    permalink: /publications/:path/
  talks:
    output: true
    permalink: /talks/:path/

defaults:
  - scope:
      path: ""
    values:
      layout: single
      author_profile: true
